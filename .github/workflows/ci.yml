name: CI
# Traceability: FR-005, FR-007, STORY-002, STORY-003

on:
  pull_request:
  push:
    branches:
      - main
      - feat

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository gate
        run: python3 scripts/ci_check.py
